<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StyleKart</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/product.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>

<div class="navbar">
  <div class="logo">StyleKart</div>
  <input id="search" class="search-box" placeholder="Search products">
  <div>
    <a href="pages/login.html">Login</a>
    <button onclick="toggleCart()" class="cart-btn">Cart 🛒</button>
  </div>
</div>

<div class="hero">BIG FASHION SALE 🔥</div>
<div id="products" class="products"></div>

<div id="cart" class="cart">
  <span class="close-cart" onclick="toggleCart()">✖</span>
  <h2>Your Cart</h2>
  <div id="cart-items"></div>
  <div id="total" class="total"></div>
  <button onclick="placeOrder()">Place Order</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script src="firebase/config.js"></script>

<script src="js/storage.js"></script>
<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/search.js"></script>
<script src="js/app.js"></script>

</body>
</html>
